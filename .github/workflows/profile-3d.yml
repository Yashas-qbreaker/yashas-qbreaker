name: Profile 3D Contrib

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    name: generate 3D contribution graph
    runs-on: ubuntu-latest

    steps:
      - name: generate github 3d contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Yashas-qbreaker

      # Remove stars and forks from generated SVG
      - name: remove stars and forks
        run: |
          sed -i '/⭐/d' profile-3d-contrib/*.svg
          sed -i '/fork/d' profile-3d-contrib/*.svg

      - name: push
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./profile-3d-contrib
